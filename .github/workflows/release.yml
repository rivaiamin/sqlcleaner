name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Run go mod tidy
        run: go mod tidy
        continue-on-error: true

      - name: Build binaries
        run: |
          mkdir -p dist
          go build -ldflags "-s -w" -o dist/sqlcleaner-linux-amd64 .
          GOOS=linux GOARCH=arm64 go build -ldflags "-s -w" -o dist/sqlcleaner-linux-arm64 .
          GOOS=darwin GOARCH=amd64 go build -ldflags "-s -w" -o dist/sqlcleaner-darwin-amd64 .
          GOOS=darwin GOARCH=arm64 go build -ldflags "-s -w" -o dist/sqlcleaner-darwin-arm64 .
          GOOS=windows GOARCH=amd64 go build -ldflags "-s -w" -o dist/sqlcleaner-windows-amd64.exe .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}
          generate_release_notes: true
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
